name: Check all
on:
  pull_request:
jobs:
  check-all:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repo
        uses: actions/checkout@v7

      - name: Enable Corepack
        run: corepack enable

      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: 'yarn'

      - name: Install dependencies
        run: yarn --immutable

      - name: Check Lint
        run: yarn lint

      - name: Build
        run: yarn build
      - name: Check types
        run: yarn types

      - name: Tests
        run: yarn test
