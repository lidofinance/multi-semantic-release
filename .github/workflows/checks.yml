name: Check all
on:
  pull_request:
jobs:
  check-all:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        node-version: [22, 24]
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Setup Node ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'yarn'

      - name: Install dependencies
        run: yarn --immutable

      - name: Check Lint
        run: yarn lint

      - name: Build
        run: yarn build
      - name: Check types
        run: yarn types

      - name: Tests
        run: yarn test
