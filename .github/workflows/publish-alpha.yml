name: Publish Beta version to registry
on:
  workflow_dispatch:

permissions:
  contents: write # to be able to publish a GitHub release
  issues: write # to be able to comment on released issues
  id-token: write # to enable use of OIDC for npm provenance

jobs:
  pre-publish:
    if: github.ref == 'refs/heads/develop'
    uses: ./.github/workflows/publish-dry-run.yml
    secrets:
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
  publish:
    needs: pre-publish
    runs-on: ubuntu-latest
    environment: development
    # restricts job to develop branch
    if: github.ref == 'refs/heads/develop'
    steps:
      - name: Checkout repo
        uses: actions/checkout@v7
        with:
          # 0 = full history + all tags; semantic-release needs them to find the
          # last release and compute the next version.
          fetch-depth: 0
          persist-credentials: false

      # Fail if develop is behind main — else the alpha regresses below the
      # latest stable (semantic-release only sees tags merged into the branch).
      - name: Ensure develop is not behind main
        run: |
          git fetch origin main
          if [ -n "$(git rev-list HEAD..origin/main)" ]; then
            echo "::error::develop is behind main — merge main into develop before an alpha release"
            exit 1
          fi

      - name: Enable Corepack
        run: corepack enable

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'yarn'

      - name: Install dependencies
        run: yarn --immutable

      - name: Build
        run: yarn build

      - name: Verify the integrity of provenance attestations and registry signatures for installed dependencies
        run: yarn npm audit --recursive --no-deprecations

      - name: Authenticate in npm
        run: |
          echo "//registry.npmjs.org/:_authToken=$NPM_TOKEN" > .npmrc
          echo "workspaces-update=false" >> .npmrc
          echo "provenance=true" >> .npmrc
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish Alpha
        run: yarn semantic-release
        env:
          NPM_CONFIG_PROVENANCE: true
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
